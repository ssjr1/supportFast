<div style="background-color: rgb(246, 253, 253);" >
    <mat-card class="card">
        <mat-card-subtitle>
            Datos de Registro
        </mat-card-subtitle>
        
        <form [formGroup]="form" (ngSubmit)="agregarPersona()">
            <mat-grid-list cols="2" rowHeight="80px">

                <mat-grid-tile [colspan]="2">
                    <mat-form-field appearance="outline">
                        <mat-label>Cédula</mat-label>
                        <input formControlName="cedula" matInput autocomplete="off">
                        <mat-error>El campo es obligatorio</mat-error>
                    </mat-form-field>
                </mat-grid-tile>

                <mat-grid-tile>
                    <mat-form-field appearance="outline">
                        <mat-label>Nombres completos</mat-label>
                        <input formControlName="nombre" matInput autocomplete="off">
                    </mat-form-field>
                </mat-grid-tile>

                <mat-grid-tile>
                    <mat-form-field appearance="outline">
                        <mat-label>Apellidos completos</mat-label>
                        <input formControlName="apellido" matInput autocomplete="off">
                    </mat-form-field>
                </mat-grid-tile>

                <mat-grid-tile>
                    <mat-form-field class="example-full-width" appearance="outline">
                        <mat-label>Fecha de nacimiento</mat-label>
                        <input matInput [min]="minDate" [max]="maxDate" [matDatepicker]="picker"
                            formControlName="fechaNacimiento">
                        <!--mat-hint>MM/DD/YYYY</mat-hint-->
                        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                        <mat-datepicker #picker></mat-datepicker>
                    </mat-form-field>
                </mat-grid-tile>



                <mat-grid-tile>
                    <mat-form-field appearance="outline">
                        <mat-label>Dirección</mat-label>
                        <mat-select formControlName="genero">
                            
                        </mat-select>
                    </mat-form-field>
                </mat-grid-tile>

                <mat-grid-tile>
                    <mat-form-field appearance="outline">
                        <mat-label>Correo electrónico</mat-label>
                        <input formControlName="correo" matInput autocomplete="off">

                    </mat-form-field>

                </mat-grid-tile>

                <mat-grid-tile>
                    <mat-form-field appearance="outline">
                        <mat-label>Contraseña</mat-label>
                        <input formControlName="direccion" matInput autocomplete="off">
                    </mat-form-field>

                </mat-grid-tile>

                <mat-grid-tile [colspan]="2">

                    <button  type="submit" class="btAgregar" mat-raised-button
                        color="primary">Registrarse</button>

                </mat-grid-tile>
            </mat-grid-list>
        </form>


    </mat-card>


</div>
