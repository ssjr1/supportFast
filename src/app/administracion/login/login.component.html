<br>
<div class="example-container">
    <label class="letras">Iniciar sesión</label>
    <br>
        <mat-form-field>
        <mat-label>Usuario</mat-label>
      <input matInput
             placeholder="pat@example.com"
             required>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hide ? 'password' : 'text'">
        <button mat-icon-button matSuffix (click)="clickEvent($event)" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
          <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
      </mat-form-field>
      
      <button class="boton" color="primary">Ingresar</button>
      <br>
      <button class="boton" color="primary" routerLink="/registro/">Registrar</button>


  </div>
