<div class="mat-elevation-z0">
  <table mat-table [dataSource]="dataSource">

    <!-- Position Column -->
    <ng-container matColumnDef="IdTicket">
      <th mat-header-cell *matHeaderCellDef> Id Ticket </th>
      <td mat-cell *matCellDef="let element"> {{element.IdTicket}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="UsResponsable">
      <th mat-header-cell *matHeaderCellDef> Usuario Responsable </th>
      <td mat-cell *matCellDef="let element"> {{element.UsResponsable}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="UsSolicitante">
      <th mat-header-cell *matHeaderCellDef> Usuario Solicitante </th>
      <td mat-cell *matCellDef="let element"> {{element.UsSolicitante}} </td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="Estado">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let element"> {{element.Estado}} </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
   
  </table>
  <div class="paginator">
    <mat-paginator [pageSizeOptions]="[5,10,]"
    showFirstLastButtons
    aria-label="Select page of periodic elements">
  </mat-paginator>
  </div>
</div>
